<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Permessi Lavoro</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --text: #fff; --red: #ff453a; --gray: #8e8e93; --orange: #ff9f0a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .page { display: none; padding: 20px; padding-bottom: 100px; min-height: 100vh; box-sizing: border-box; }
        .active { display: block; }

        .circle { width: 180px; height: 180px; border: 5px solid var(--blue); border-radius: 50%; margin: 20px auto 40px; display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: bold; flex-direction: column; }
        .circle span { font-size: 14px; color: var(--gray); font-weight: normal; }

        .box { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--gray); margin-bottom: 6px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; background: #2c2c2e; border: none; color: #fff; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--blue); border: none; color: #fff; padding: 18px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 17px; margin-top: 10px; }

        /* Storico con Divisione E/U */
        .month-header { display: flex; justify-content: space-between; padding: 20px 5px 10px; border-bottom: 1px solid #333; color: var(--blue); font-weight: bold; text-transform: capitalize; }
        .hist-item { background: var(--card); margin-top: 10px; padding: 15px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; }
        .hist-date { font-size: 12px; color: var(--gray); margin-top: 4px; }
        .tag-container { display: flex; gap: 5px; margin-top: 8px; }
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .tag-e { background: rgba(255, 159, 10, 0.2); color: var(--orange); } /* Arancio per Entrata */
        .tag-u { background: rgba(10, 132, 255, 0.2); color: var(--blue); }   /* Blu per Uscita */
        .hist-min { color: var(--red); font-weight: 700; font-size: 18px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(15px); display: flex; border-top: 0.5px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; padding: 15px; text-align: center; font-size: 11px; color: var(--gray); }
        .tab-item.active-tab { color: var(--blue); }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <div class="circle" id="balanceDisplay">...<span>minuti</span></div>
        <div class="box"><label>Data Turno</label><input type="date" id="shiftDate"></div>
        <div class="box">
            <label>Turno</label>
            <select id="shiftSelect" onchange="applyShiftPreset()">
                <option value="">-- Scegli --</option>
                <option value="M78|07:00-15:00">M78 (07-15)</option>
                <option value="M88|08:00-16:00">M88 (08-16)</option>
                <option value="P38|15:00-23:00">P38 (15-23)</option>
            </select>
        </div>
        <div class="box" style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>Entrata</label><input type="time" id="entryTime"></div>
            <div style="flex: 1;"><label>Uscita</label><input type="time" id="exitTime"></div>
        </div>
        <button class="btn" onclick="processRecord()">REGISTRA</button>
    </div>

    <div id="historyPage" class="page">
        <h2 style="margin-left: 10px;">Storico Dettagliato</h2>
        <div id="historyContainer">Caricamento...</div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active-tab" id="tabHome" onclick="switchPage('home')">🏠 Home</div>
        <div class="tab-item" id="tabHist" onclick="switchPage('history')">📜 Storico</div>
    </div>

<script>
    const SUPABASE_URL = 'https://dzxernjfrulapqofwqdd.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_zqzcQKMAmtUo0NR1sMytFg_lt6uv9AW';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('shiftDate').valueAsDate = new Date();

    async function switchPage(target) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active-tab'));
        if(target === 'home') {
            document.getElementById('homePage').classList.add('active');
            document.getElementById('tabHome').classList.add('active-tab');
            refreshBalance();
        } else {
            document.getElementById('historyPage').classList.add('active');
            document.getElementById('tabHist').classList.add('active-tab');
            renderHistory();
        }
    }

    async function refreshBalance() {
        const { data } = await _supabase.from('history').select('minutes, created_at');
        const ora = new Date();
        const usati = data ? data.reduce((acc, item) => {
            const d = new Date(item.created_at);
            return (d.getMonth() === ora.getMonth() && d.getFullYear() === ora.getFullYear()) ? acc + item.minutes : acc;
        }, 0) : 0;
        document.getElementById('balanceDisplay').innerHTML = (180 - usati) + "<span>minuti</span>";
    }

    function applyShiftPreset() {
        const val = document.getElementById('shiftSelect').value;
        if (!val) return;
        const [i, f] = val.split('|')[1].split('-');
        document.getElementById('entryTime').value = i;
        document.getElementById('exitTime').value = f;
    }

    async function processRecord() {
        const shiftVal = document.getElementById('shiftSelect').value;
        const dateVal = document.getElementById('shiftDate').value;
        if (!shiftVal) return alert("Seleziona il turno!");

        const [shiftName, orari] = shiftVal.split('|');
        const [tI, tF] = orari.split('-');
        const eR = document.getElementById('entryTime').value;
        const uR = document.getElementById('exitTime').value;

        let mE = eR > tI ? diffInMinutes(tI, eR) : 0;
        let mU = uR < tF ? diffInMinutes(uR, tF) : 0;
        let totale = mE + mU;

        if (totale > 0) {
            if(confirm(`Registrare ${totale} min (Entrata: ${mE}, Uscita: ${mU})?`)) {
                // Salviamo anche il dettaglio nella colonna "shift" o in una nota se vuoi, 
                // ma per ora lo codifichiamo nel nome così: "M78 (E:10 U:5)"
                const label = `${shiftName}|${mE}|${mU}`; 
                await _supabase.from('history').insert([{ 
                    shift: label, 
                    minutes: totale, 
                    created_at: new Date(dateVal).toISOString() 
                }]);
                refreshBalance();
                alert("Registrato!");
            }
        } else alert("Nessun permesso rilevato.");
    }

    function diffInMinutes(s, e) {
        const start = s.split(':'), end = e.split(':');
        return Math.floor((new Date(0,0,0,end[0],end[1]) - new Date(0,0,0,start[0],start[1]))/60000);
    }

    async function renderHistory() {
        const cont = document.getElementById('historyContainer');
        const { data } = await _supabase.from('history').select('*').order('created_at', { ascending: false });
        
        if (!data || data.length === 0) { cont.innerHTML = "Vuoto"; return; }

        const groups = {};
        data.forEach(item => {
            const d = new Date(item.created_at);
            const key = d.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
            if (!groups[key]) groups[key] = { items: [], total: 0 };
            groups[key].items.push(item);
            groups[key].total += item.minutes;
        });

        let html = "";
        for (const month in groups) {
            html += `<div class="month-header"><span>${month}</span><span>Tot: ${groups[month].total}m</span></div>`;
            groups[month].items.forEach(row => {
                const dateFmt = new Date(row.created_at).toLocaleDateString('it-IT');
                // Recuperiamo i dettagli salvati nel formato "NOME|E|U"
                const parts = row.shift.split('|');
                const name = parts[0];
                const ent = parts[1] || 0;
                const usc = parts[2] || 0;

                html += `
                <div class="hist-item">
                    <div class="hist-info">
                        <b>Turno ${name}</b>
                        <div class="hist-date">${dateFmt}</div>
                        <div class="tag-container">
                            ${ent > 0 ? `<span class="tag tag-e">Entrata: ${ent}m</span>` : ''}
                            ${usc > 0 ? `<span class="tag tag-u">Uscita: ${usc}m</span>` : ''}
                        </div>
                    </div>
                    <div class="hist-min">-${row.minutes}m</div>
                </div>`;
            });
        }
        cont.innerHTML = html;
    }

    refreshBalance();
</script>
</body>
</html>
