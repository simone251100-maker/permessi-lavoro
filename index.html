<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Permessi Lavoro</title>
    
    <meta name="apple-mobile-web-app-title" content="Permessi">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --red: #ff453a; --text: #fff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 20px 40px 20px; }
        
        .circle { width: 140px; height: 140px; border: 6px solid var(--blue); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; flex-direction: column; }
        .circle span { font-size: 12px; color: #8e8e93; font-weight: normal; }

        .box { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #8e8e93; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 16px; outline: none; box-sizing: border-box; }

        .btn { background: var(--blue); border: none; color: #fff; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 5px; }
        
        /* Stile Storico */
        .history-title { text-align: left; margin-top: 30px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .history-list { margin-top: 10px; text-align: left; }
        .history-item { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--blue); display: flex; justify-content: space-between; font-size: 14px; }
        .history-date { color: #8e8e93; font-size: 11px; }

        .reset-btn { color: var(--red); background: none; border: none; font-size: 12px; text-decoration: underline; padding: 10px; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="circle" id="balanceDisplay">...<span>minuti</span></div>

    <div class="box">
        <label>Turno</label>
        <select id="shiftSelect" onchange="updateShiftTimes()">
            <option value="">-- Seleziona --</option>
            <option value="M78|07:00-15:00">M78 (07-15)</option>
            <option value="M88|08:00-16:00">M88 (08-16)</option>
            <option value="P38|15:00-23:00">P38 (15-23)</option>
        </select>
    </div>

    <div class="box" style="display: flex; gap: 10px;">
        <div style="flex: 1;"><label>Entrata</label><input type="time" id="entryTime"></div>
        <div style="flex: 1;"><label>Uscita</label><input type="time" id="exitTime"></div>
    </div>

    <button class="btn" onclick="calcolaESalva()">REGISTRA PERMESSO</button>

    <div class="history-title">Storico <small id="status" style="font-size: 10px; color: #444;">...</small></div>
    <div id="historyList" class="history-list"></div>

    <button class="reset-btn" onclick="resetMensile()">Nuovo Mese (Ripristina 180m)</button>

<script>
    const SUPABASE_URL = 'IL_TUO_URL'; 
    const SUPABASE_KEY = 'LA_TUA_KEY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentBalance = 0;

    async function init() {
        await loadBalance();
        await loadHistory();
    }

    async function loadBalance() {
        const { data } = await _supabase.from('user_data').select('value').eq('label', 'minuti_residui').single();
        if (data) {
            currentBalance = data.value;
            document.getElementById('balanceDisplay').innerHTML = currentBalance + "<span>minuti</span>";
            document.getElementById('status').innerText = "Sincronizzato";
        }
    }

    async function loadHistory() {
        const { data } = await _supabase.from('history').select('*').order('created_at', { ascending: false }).limit(10);
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        if (data) {
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleDateString('it-IT');
                list.innerHTML += `<div class="history-item">
                    <div><b>${item.shift}</b> <br> <span class="history-date">${date}</span></div>
                    <div style="color: var(--red)">-${item.minutes}m</div>
                </div>`;
            });
        }
    }

    function updateShiftTimes() {
        const val = document.getElementById('shiftSelect').value;
        if (!val) return;
        const [nome, orari] = val.split('|');
        const [inizio, fine] = orari.split('-');
        document.getElementById('entryTime').value = inizio;
        document.getElementById('exitTime').value = fine;
    }

    async function calcolaESalva() {
        const shiftSelect = document.getElementById('shiftSelect');
        if (!shiftSelect.value) return alert("Seleziona un turno!");

        const shiftName = shiftSelect.value.split('|')[0];
        const [tInizio, tFine] = shiftSelect.value.split('|')[1].split('-');
        const eEff = document.getElementById('entryTime').value;
        const uEff = document.getElementById('exitTime').value;

        let minutiUsati = 0;
        if (eEff > tInizio) minutiUsati += calcolaDiff(tInizio, eEff);
        if (uEff < tFine) minutiUsati += calcolaDiff(uEff, tFine);

        if (minutiUsati > 0) {
            if(confirm(`Confermi l'utilizzo di ${minutiUsati} minuti?`)) {
                currentBalance -= minutiUsati;
                // Update Saldo
                await _supabase.from('user_data').update({ value: currentBalance }).eq('label', 'minuti_residui');
                // Aggiungi allo storico
                await _supabase.from('history').insert([{ shift: shiftName, minutes: minutiUsati }]);
                
                init(); // Ricarica tutto
                alert("Registrato con successo!");
            }
        } else {
            alert("Nessun permesso rilevato.");
        }
    }

    function calcolaDiff(start, end) {
        const s = start.split(':'), e = end.split(':');
        return Math.floor(((new Date(0,0,0,e[0],e[1]) - new Date(0,0,0,s[0],s[1]))) / 60000);
    }

    async function resetMensile() {
        if(confirm("Sei sicuro? Questo riporterà il saldo a 180 minuti per il nuovo mese.")) {
            await _supabase.from('user_data').update({ value: 180 }).eq('label', 'minuti_residui');
            // Opzionale: svuota lo storico? Meglio di no, lasciamolo per controllo.
            init();
        }
    }

    init();
</script>
</body>
</html>
