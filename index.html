<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Permessi</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --text: #fff; --red: #ff453a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .page { display: none; padding: 20px; padding-bottom: 100px; min-height: 100vh; box-sizing: border-box; }
        .active { display: block; }
        .circle { width: 150px; height: 150px; border: 6px solid var(--blue); border-radius: 50%; margin: 30px auto; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: bold; flex-direction: column; }
        .circle span { font-size: 14px; color: #8e8e93; font-weight: normal; }
        .box { background: var(--card); padding: 12px 15px; border-radius: 15px; margin-bottom: 10px; }
        label { display: block; font-size: 10px; color: #8e8e93; margin-bottom: 4px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; background: #2c2c2e; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { background: var(--blue); border: none; color: #fff; padding: 16px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .month-header { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #333; color: var(--blue); font-weight: bold; text-transform: capitalize; }
        .hist-item { background: var(--card); margin-top: 8px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .hist-date { font-size: 11px; color: #8e8e93; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); display: flex; border-top: 0.5px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; padding: 15px; text-align: center; font-size: 12px; color: #8e8e93; }
        .tab-item.active-tab { color: var(--blue); font-weight: bold; }
        .reset-btn { color: var(--red); background: none; border: none; font-size: 12px; margin-top: 30px; width: 100%; }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <div class="circle" id="balanceDisplay">...<span>minuti</span></div>

        <div class="box">
            <label>Data Turno</label>
            <input type="date" id="shiftDate">
        </div>

        <div class="box">
            <label>Turno</label>
            <select id="shiftSelect" onchange="updateShiftTimes()">
                <option value="">-- Seleziona --</option>
                <option value="M78|07:00-15:00">M78 (07-15)</option>
                <option value="M88|08:00-16:00">M88 (08-16)</option>
                <option value="P38|15:00-23:00">P38 (15-23)</option>
            </select>
        </div>

        <div class="box" style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>Entrata</label><input type="time" id="entryTime"></div>
            <div style="flex: 1;"><label>Uscita</label><input type="time" id="exitTime"></div>
        </div>

        <button class="btn" onclick="calcolaESalva()">REGISTRA</button>
        <button class="reset-btn" onclick="resetMensile()">Ripristina 180m</button>
    </div>

    <div id="historyPage" class="page">
        <h2>Storico</h2>
        <div id="historyContainer">Caricamento...</div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active-tab" id="tabHome" onclick="showPage('home')">🏠 Home</div>
        <div class="tab-item" id="tabHist" onclick="showPage('history')">📜 Storico</div>
    </div>

<script>
    const SUPABASE_URL = 'sb_publishable_zqzcQKMAmtUo0NR1sMytFg_lt6uv9AW'; 
    const SUPABASE_KEY = 'sb_publishable_zqzcQKMAmtUo0NR1sMytFg_lt6uv9AW';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Imposta data di oggi al caricamento
    document.getElementById('shiftDate').valueAsDate = new Date();

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active-tab'));
        if(page === 'home') {
            document.getElementById('homePage').classList.add('active');
            document.getElementById('tabHome').classList.add('active-tab');
            loadBalance();
        } else {
            document.getElementById('historyPage').classList.add('active');
            document.getElementById('tabHist').classList.add('active-tab');
            loadHistory();
        }
    }

    async function loadBalance() {
        const { data } = await _supabase.from('user_data').select('value').eq('label', 'minuti_residui').single();
        if (data) document.getElementById('balanceDisplay').innerHTML = data.value + "<span>minuti</span>";
    }

    async function loadHistory() {
        const container = document.getElementById('historyContainer');
        const { data } = await _supabase.from('history').select('*').order('created_at', { ascending: false });
        if (!data || data.length === 0) { container.innerHTML = "Vuoto"; return; }

        const groups = {};
        data.forEach(item => {
            const date = new Date(item.created_at);
            const key = date.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
            if (!groups[key]) groups[key] = { items: [], total: 0 };
            groups[key].items.push(item);
            groups[key].total += item.minutes;
        });

        let html = "";
        for (const month in groups) {
            html += `<div class="month-header"><span>${month}</span><span>${groups[month].total}m</span></div>`;
            groups[month].items.forEach(row => {
                const d = new Date(row.created_at).toLocaleDateString('it-IT');
                html += `<div class="hist-item">
                    <div><b>${row.shift}</b><br><span class="hist-date">${d}</span></div>
                    <div style="color:var(--red)">-${row.minutes}m</div>
                </div>`;
            });
        }
        container.innerHTML = html;
    }

    function updateShiftTimes() {
        const val = document.getElementById('shiftSelect').value;
        if (!val) return;
        const [inizio, fine] = val.split('|')[1].split('-');
        document.getElementById('entryTime').value = inizio;
        document.getElementById('exitTime').value = fine;
    }

    async function calcolaESalva() {
        const sel = document.getElementById('shiftSelect');
        const customDate = document.getElementById('shiftDate').value; // DATA SCELTA
        if (!sel.value || !customDate) return alert("Inserisci tutti i dati!");

        const shiftName = sel.value.split('|')[0];
        const [tInizio, tFine] = sel.value.split('|')[1].split('-');
        const eEff = document.getElementById('entryTime').value;
        const uEff = document.getElementById('exitTime').value;

        let diff = 0;
        if (eEff > tInizio) diff += calcolaDiff(tInizio, eEff);
        if (uEff < tFine) diff += calcolaDiff(uEff, tFine);

        if (diff > 0) {
            if(confirm(`Scalare ${diff} minuti per il giorno ${customDate}?`)) {
                // Sottrai dal saldo
                const { data: current } = await _supabase.from('user_data').select('value').eq('label', 'minuti_residui').single();
                let newBalance = current.value - diff;
                await _supabase.from('user_data').update({ value: newBalance }).eq('label', 'minuti_residui');
                
                // Inserisci nello storico con la data scelta
                // Usiamo created_at sovrascrivendolo con la data del calendario
                await _supabase.from('history').insert([{ 
                    shift: shiftName, 
                    minutes: diff, 
                    created_at: new Date(customDate).toISOString() 
                }]);
                
                loadBalance();
                alert("Registrato!");
            }
        } else alert("Nessun permesso rilevato.");
    }

    function calcolaDiff(s, e) {
        const start = s.split(':'), end = e.split(':');
        return Math.floor((new Date(0,0,0,end[0],end[1]) - new Date(0,0,0,start[0],start[1]))/60000);
    }

    async function resetMensile() {
        if(confirm("Resetti a 180m?")) {
            await _supabase.from('user_data').update({ value: 180 }).eq('label', 'minuti_residui');
            loadBalance();
        }
    }

    loadBalance();
</script>
</body>
</html>
